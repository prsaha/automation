[tool.ruff]
# Exclude migration files from formatting to prevent database issues
exclude = [
    "migrations/versions/*.py",
    ".git",
    "__pycache__",
    ".pytest_cache",
    ".ruff_cache",
    "env",
    "venv",
]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
]

ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

